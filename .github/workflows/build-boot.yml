name: Build Docker boot images

on:
  workflow_dispatch:
    inputs:
      device:
        description: Device to build
        required: true
        default: pine
        type: choice
        options:
          - pine
          - riva
          - mido
      boot_source_url:
        description: Direct URL to matching boot.img or ROM zip. Empty uses repo variables.
        required: false
      kernel_repo:
        description: Optional kernel repo override
        required: false
      kernel_ref:
        description: Optional kernel ref override
        required: false
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.device }}
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: pine
            script: devices/pine/scripts/build-pine-docker-kernel.sh
            default_kernel_repo: https://github.com/hsx02/kernel_xiaomi_sdm439.git
            default_kernel_ref: a12/main
            base_boot: devices/pine/base/boot-current.img
            artifact_name: pine-docker-boot
          - device: riva
            script: devices/riva/scripts/build-riva-docker-kernel.sh
            default_kernel_repo: https://github.com/crdroidandroid/android_kernel_xiaomi_rova.git
            default_kernel_ref: "14.0"
            base_boot: devices/riva/base/boot-current.img
            artifact_name: riva-docker-boot
          - device: mido
            script: devices/mido/scripts/build-mido-docker-kernel.sh
            default_kernel_repo: https://github.com/AlphaDroid-devices/kernel_xiaomi_mido.git
            default_kernel_ref: alpha-14
            base_boot: devices/mido/base/boot-current.img
            artifact_name: mido-docker-droidspaces-audio-boot

    steps:
      - name: Checkout build inputs
        uses: actions/checkout@v4

      - name: Resolve boot URL
        env:
          INPUT_BOOT_URL: ${{ inputs.boot_source_url }}
          INPUT_DEVICE: ${{ inputs.device }}
          DEVICE: ${{ matrix.device }}
          PINE_BOOT_SOURCE_URL: ${{ vars.PINE_BOOT_SOURCE_URL }}
          RIVA_BOOT_SOURCE_URL: ${{ vars.RIVA_BOOT_SOURCE_URL }}
          MIDO_BOOT_SOURCE_URL: ${{ vars.MIDO_BOOT_SOURCE_URL }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_DEVICE" != "$DEVICE" ]; then
            echo "Skipping matrix device $DEVICE; requested $INPUT_DEVICE."
            echo "SKIP_DEVICE=1" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SKIP_DEVICE=0" >> "$GITHUB_ENV"
          case "$DEVICE" in
            pine) DEFAULT_BOOT_URL="$PINE_BOOT_SOURCE_URL" ;;
            riva) DEFAULT_BOOT_URL="$RIVA_BOOT_SOURCE_URL" ;;
            mido) DEFAULT_BOOT_URL="${MIDO_BOOT_SOURCE_URL:-https://sourceforge.net/projects/kamisroms/files/Mido/Crdroid/A15/crDroidAndroid-15.0-20260531-mido-v11.16.zip/download}" ;;
            *) echo "Unknown device: $DEVICE"; exit 1 ;;
          esac
          BOOT_URL="${INPUT_BOOT_URL:-$DEFAULT_BOOT_URL}"
          if [ -z "$BOOT_URL" ]; then
            echo "Missing boot image URL."
            echo "Set repository variable PINE_BOOT_SOURCE_URL, RIVA_BOOT_SOURCE_URL, MIDO_BOOT_SOURCE_URL, or pass workflow_dispatch boot_source_url."
            exit 1
          fi
          echo "BOOT_URL=$BOOT_URL" >> "$GITHUB_ENV"

      - name: Install boot download tools
        if: env.SKIP_DEVICE != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl file unzip

      - name: Download matching boot image
        if: env.SKIP_DEVICE != '1'
        run: |
          mkdir -p "$(dirname "${{ matrix.base_boot }}")"
          TMP_BOOT_SOURCE="$(mktemp)"
          curl -L --fail --retry 5 --retry-delay 5 \
            -o "$TMP_BOOT_SOURCE" \
            "$BOOT_URL"
          if file "$TMP_BOOT_SOURCE" | grep -qi 'zip archive'; then
            unzip -p "$TMP_BOOT_SOURCE" boot.img > "${{ matrix.base_boot }}"
          else
            cp -f "$TMP_BOOT_SOURCE" "${{ matrix.base_boot }}"
          fi
          file "${{ matrix.base_boot }}"
          sha256sum "${{ matrix.base_boot }}"

      - name: Build kernel from upstream
        if: env.SKIP_DEVICE != '1'
        env:
          KERNEL_REPO: ${{ inputs.kernel_repo || matrix.default_kernel_repo }}
          KERNEL_REF: ${{ inputs.kernel_ref || matrix.default_kernel_ref }}
        run: |
          chmod +x "${{ matrix.script }}"
          "${{ matrix.script }}"

      - name: Repack boot image
        if: env.SKIP_DEVICE != '1'
        run: |
          chmod +x scripts/repack-boot.sh
          scripts/repack-boot.sh \
            "${{ matrix.base_boot }}" \
            "devices/${{ matrix.device }}/artifacts/Image.gz-dtb" \
            "devices/${{ matrix.device }}/artifacts/boot-docker.img"

      - name: Write build manifest
        if: env.SKIP_DEVICE != '1'
        run: |
          {
            echo "device=${{ matrix.device }}"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "github_sha=${GITHUB_SHA}"
            echo "boot_source_url=${BOOT_URL}"
            echo "upstream_repo=$(cat devices/${{ matrix.device }}/artifacts/upstream-repo)"
            echo "upstream_ref=$(cat devices/${{ matrix.device }}/artifacts/upstream-ref)"
            echo "upstream_commit=$(cat devices/${{ matrix.device }}/artifacts/upstream-commit)"
            echo "kernel_release=$(cat devices/${{ matrix.device }}/artifacts/kernel-release)"
            echo "boot_sha256=$(cut -d ' ' -f 1 devices/${{ matrix.device }}/artifacts/boot-docker.img.sha256)"
          } > "devices/${{ matrix.device }}/artifacts/build-manifest.env"

      - name: Upload boot artifact
        if: env.SKIP_DEVICE != '1'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 1
          path: |
            devices/${{ matrix.device }}/artifacts/boot-docker.img
            devices/${{ matrix.device }}/artifacts/boot-docker.img.sha256
            devices/${{ matrix.device }}/artifacts/Image.gz-dtb
            devices/${{ matrix.device }}/artifacts/config-docker-final
            devices/${{ matrix.device }}/artifacts/kernel-release
            devices/${{ matrix.device }}/artifacts/upstream-*
            devices/${{ matrix.device }}/artifacts/build-manifest.env
          if-no-files-found: error
